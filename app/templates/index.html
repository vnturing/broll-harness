<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B-Roll Harness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0b09;
      --surface:  #141310;
      --card:     #1a1814;
      --border:   #2a2720;
      --border-h: #3d3830;
      --amber:    #d4a843;
      --amber-d:  #a07a28;
      --amber-l:  #e8c06a;
      --text:     #c8bfa8;
      --text-dim: #6e6458;
      --text-faint: #3d3830;
      --red:      #c04a3a;
      --green:    #4a8a5a;
      --mono: 'JetBrains Mono', monospace;
      --serif: 'DM Serif Display', Georgia, serif;
      --body: 'Fraunces', Georgia, serif;
    }

    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Film-strip side decoration */
    body::before {
      content: '';
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--surface) 0px,
        var(--surface) 6px,
        var(--bg) 6px,
        var(--bg) 12px
      );
      border-right: 1px solid var(--border);
      z-index: 100;
    }
    body::after {
      content: '';
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--surface) 0px,
        var(--surface) 6px,
        var(--bg) 6px,
        var(--bg) 12px
      );
      border-left: 1px solid var(--border);
      z-index: 100;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* ── Header ── */
    header {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }
    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .wordmark-title {
      font-family: var(--serif);
      font-size: 28px;
      color: var(--amber);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .wordmark-sub {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .header-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
    }
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Search bar ── */
    .search-section {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }
    .search-field {
      flex: 1;
      position: relative;
    }
    .search-field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 14px 18px 14px 44px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-field input:focus {
      border-color: var(--amber);
    }
    .search-field input::placeholder { color: var(--text-dim); }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-primary {
      background: var(--amber);
      border-color: var(--amber);
      color: #0c0b09;
    }
    .btn-primary:hover { background: var(--amber-l); border-color: var(--amber-l); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--text); }
    .btn-ghost.active {
      border-color: var(--amber);
      color: var(--amber);
    }

    /* Source toggles */
    .source-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .source-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-right: 4px;
    }
    .source-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.12s;
      user-select: none;
    }
    .source-toggle.on { border-color: var(--amber); color: var(--amber); }
    .source-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── Layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: calc(100vh - 200px);
    }

    /* ── Results panel ── */
    .results-panel {
      border-right: 1px solid var(--border);
      padding: 24px 32px 24px 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .count-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--amber);
      background: rgba(212,168,67,0.08);
      border: 1px solid rgba(212,168,67,0.2);
      padding: 2px 8px;
      border-radius: 2px;
    }

    /* Loading shimmer */
    .shimmer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .shimmer-card {
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .shimmer-thumb { height: 130px; background: var(--card); }
    .shimmer-line { height: 10px; background: var(--card); margin: 12px 12px 8px; border-radius: 2px; }
    .shimmer-line-short { width: 60%; height: 8px; background: var(--card); margin: 0 12px 12px; border-radius: 2px; }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Results grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }
    .video-card:hover {
      border-color: var(--border-h);
      transform: translateY(-1px);
    }
    .video-card.selected {
      border-color: var(--amber);
      box-shadow: 0 0 0 1px rgba(212,168,67,0.2);
    }

    .card-thumb {
      position: relative;
      height: 128px;
      background: var(--surface);
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .video-card:hover .card-thumb img { transform: scale(1.04); }
    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 28px;
    }

    .source-badge {
      position: absolute;
      top: 8px; left: 8px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 500;
    }
    .badge-pexels   { background: rgba(0,0,0,0.7); color: #4dd4ac; border: 1px solid rgba(77,212,172,0.3); }
    .badge-pixabay  { background: rgba(0,0,0,0.7); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
    .badge-youtube  { background: rgba(0,0,0,0.7); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .badge-archive  { background: rgba(0,0,0,0.7); color: #c084fc; border: 1px solid rgba(192,132,252,0.3); }

    .duration-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      font-family: var(--mono);
      font-size: 10px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 1px 6px;
      border-radius: 2px;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(212,168,67,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
    }

    .card-body { padding: 10px 12px 12px; }
    .card-title {
      font-family: var(--body);
      font-size: 12.5px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .card-actions {
      display: flex;
      gap: 6px;
    }
    .card-btn {
      flex: 1;
      padding: 5px 0;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
    }
    .card-btn:hover { border-color: var(--amber); color: var(--amber); }
    .card-btn.downloading { color: var(--amber); border-color: var(--amber); animation: pulse 1s infinite; }
    .card-btn.done { color: var(--green); border-color: var(--green); }

    /* ── Preview modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: 4px;
      width: 100%;
      max-width: 860px;
      overflow: hidden;
      animation: modal-in 0.2s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--text);
      font-style: italic;
    }
    .modal-close {
      background: none; border: none; color: var(--text-dim);
      font-size: 20px; cursor: pointer; line-height: 1;
      transition: color 0.12s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-video video, .modal-video iframe {
      width: 100%; height: 100%; display: block;
      border: none;
    }
    .modal-footer {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .modal-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .modal-license {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-faint);
      font-style: italic;
    }

    /* ── Library sidebar ── */
    .library-panel {
      padding: 24px 0 24px 24px;
    }
    .library-scroll {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - 260px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .lib-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: border-color 0.12s;
    }
    .lib-item:hover { border-color: var(--border-h); }
    .lib-thumb {
      width: 52px; height: 36px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      background: var(--surface);
    }
    .lib-info { flex: 1; min-width: 0; }
    .lib-title {
      font-size: 11px;
      font-family: var(--body);
      font-weight: 300;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lib-meta {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .lib-status {
      font-family: var(--mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .lib-status.complete  { color: var(--green);  background: rgba(74,138,90,0.1);  }
    .lib-status.pending   { color: var(--amber);  background: rgba(212,168,67,0.08); }
    .lib-status.downloading { color: var(--amber); background: rgba(212,168,67,0.08); animation: pulse 1s infinite; }
    .lib-status.error     { color: var(--red);    background: rgba(192,74,58,0.1);  }

    .lib-delete {
      background: none; border: none;
      color: var(--text-faint);
      cursor: pointer; font-size: 14px; line-height: 1;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .lib-delete:hover { color: var(--red); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

    /* Toast */
    .toast-stack {
      position: fixed;
      bottom: 28px; right: 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }
    .toast {
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 16px;
      border-radius: 3px;
      border: 1px solid;
      animation: toast-in 0.2s ease;
      max-width: 300px;
    }
    .toast-success { background: rgba(74,138,90,0.15); border-color: var(--green); color: var(--green); }
    .toast-error   { background: rgba(192,74,58,0.12); border-color: var(--red);   color: var(--red); }
    .toast-info    { background: rgba(212,168,67,0.1); border-color: var(--amber); color: var(--amber); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── Projects sidebar ── */
    .project-section {
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 16px;
    }
    .project-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .project-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 2px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--mono);
      font-size: 10px;
    }
    .project-item:hover { background: var(--surface); border-color: var(--border); }
    .project-item.active { border-color: var(--amber); color: var(--amber); background: rgba(212,168,67,0.06); }
    .project-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
    .project-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.05em; }
    .project-del { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 13px; padding: 0 2px; transition: color 0.12s; }
    .project-del:hover { color: var(--red); }
    .new-project-form {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .new-project-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .new-project-form input:focus { border-color: var(--amber); }
    .new-project-form input::placeholder { color: var(--text-dim); }
    .project-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 8px;
      outline: none;
      cursor: pointer;
      min-width: 160px;
    }
    .project-select:focus { border-color: var(--amber); }

    /* Responsive */
    @media (max-width: 900px) {
      .app { padding: 0 28px; }
      .main-grid { grid-template-columns: 1fr; }
      .library-panel { border-top: 1px solid var(--border); padding: 24px 0 0; }
      .results-panel { border-right: none; padding-right: 0; }
      .library-scroll { max-height: 300px; }
    }
    @media (max-width: 600px) {
      .app { padding: 0 24px; }
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

  </style>
</head>
<body>

<div class="app" x-data="brollApp()" x-init="init()">

  <!-- Header -->
  <header>
    <div class="wordmark">
      <div class="wordmark-title">B-Roll Harness</div>
      <div class="wordmark-sub">Visual Research Workbench</div>
    </div>
    <div class="header-meta">
      <div><span class="status-dot"></span>System Ready</div>
      <div style="margin-top:4px;">
        <span x-text="library.length"></span> clips in library
      </div>
    </div>
  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-row">
      <div class="search-field">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          x-model="query"
          placeholder="volcano eruption, city timelapse, ocean waves..."
          @keydown.enter="doSearch()"
          @keydown.escape="clearSearch()"
        />
      </div>
      <button class="btn btn-primary" @click="doSearch()" :disabled="loading || !query.trim()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Search
      </button>
      <button class="btn btn-ghost" @click="clearSearch()">Clear</button>
    </div>

    <div class="source-row">
      <span class="source-label">Sources:</span>
      <template x-for="src in sources" :key="src.id">
        <div
          class="source-toggle"
          :class="src.on ? 'on' : ''"
          @click="src.on = !src.on"
        >
          <span class="source-dot"></span>
          <span x-text="src.label"></span>
        </div>
      </template>
    </div>
  </section>

  <!-- Main -->
  <div class="main-grid">

    <!-- Results -->
    <div class="results-panel">
      <div class="panel-header">
        <span class="panel-title">Search Results</span>
        <span class="count-badge" x-show="results.length > 0" x-text="results.length + ' clips'"></span>
      </div>

      <!-- Shimmer -->
      <div class="shimmer-grid" x-show="loading">
        <template x-for="i in 8" :key="i">
          <div class="shimmer-card">
            <div class="shimmer-thumb"></div>
            <div class="shimmer-line"></div>
            <div class="shimmer-line-short"></div>
          </div>
        </template>
      </div>

      <!-- Results grid -->
      <div class="video-grid" x-show="!loading && results.length > 0">
        <template x-for="video in results" :key="video.id">
          <div
            class="video-card"
            :class="selected?.id === video.id ? 'selected' : ''"
            @click="selectVideo(video)"
          >
            <div class="card-thumb">
              <template x-if="video.thumbnail">
                <img :src="video.thumbnail" :alt="video.title" loading="lazy" />
              </template>
              <template x-if="!video.thumbnail">
                <div class="thumb-placeholder">▶</div>
              </template>

              <span class="source-badge" :class="'badge-' + video.source" x-text="video.source"></span>

              <template x-if="video.duration">
                <span class="duration-badge" x-text="fmtDuration(video.duration)"></span>
              </template>

              <div class="play-overlay">
                <div class="play-btn" @click.stop="openPreview(video)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
              </div>
            </div>

            <div class="card-body">
              <div class="card-title" x-text="video.title"></div>
              <div class="card-actions">
                <button class="card-btn" @click.stop="openPreview(video)">Preview</button>
                <button
                  class="card-btn"
                  :class="getDownloadClass(video.id)"
                  @click.stop="triggerDownload(video)"
                  x-text="getDownloadLabel(video.id)"
                ></button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Empty -->
      <div class="empty-state" x-show="!loading && results.length === 0 && searched">
        <div class="empty-icon">◻</div>
        No results found. Try different keywords or enable more sources.
      </div>
      <div class="empty-state" x-show="!loading && !searched">
        <div class="empty-icon">⌕</div>
        Enter a search query to begin.
      </div>
    </div>

    <!-- Library sidebar -->
    <div class="library-panel">

      <!-- Projects section -->
      <div class="project-section">
        <div class="project-header">
          <span class="panel-title">Projects</span>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:10px;" @click="showNewProject = !showNewProject">+ New</button>
        </div>
        <div class="project-list">
          <div class="project-item" :class="activeProject === null ? 'active' : ''" @click="filterByProject(null)">
            <div class="project-dot" style="background:var(--text-dim);"></div>
            <span class="project-name">All clips</span>
          </div>
          <template x-for="proj in projects" :key="proj.id">
            <div class="project-item" :class="activeProject === proj.id ? 'active' : ''" @click="filterByProject(proj.id)">
              <div class="project-dot"></div>
              <span class="project-name" x-text="proj.name"></span>
              <button class="project-del" @click.stop="deleteProject(proj.id)" title="Delete project">×</button>
            </div>
          </template>
          <div class="empty-state" x-show="projects.length === 0" style="padding:10px 0;font-size:10px;">No projects yet</div>
        </div>
        <div class="new-project-form" x-show="showNewProject" x-cloak>
          <input type="text" x-model="newProjectName" placeholder="Project name…" @keydown.enter="createProject()" @keydown.escape="showNewProject = false" />
          <button class="btn btn-primary" style="padding:5px 10px;font-size:9px;" @click="createProject()">Add</button>
        </div>
      </div>

      <!-- Library header -->
      <div class="panel-header">
        <span class="panel-title" x-text="activeProject ? (projects.find(p=>p.id===activeProject)?.name || activeProject) + ' clips' : 'All clips'"></span>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:10px;" @click="loadLibrary()">↺ Refresh</button>
      </div>

      <div class="library-scroll">
        <div class="empty-state" x-show="library.length === 0" style="padding:30px 10px;">
          <div class="empty-icon" style="font-size:24px;">📁</div>
          Downloaded clips appear here
        </div>
        <template x-for="item in library" :key="item.id">
          <div class="lib-item">
            <template x-if="item.thumbnail">
              <img class="lib-thumb" :src="item.thumbnail" :alt="item.title" loading="lazy" />
            </template>
            <template x-if="!item.thumbnail">
              <div class="lib-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:14px;">▶</div>
            </template>
            <div class="lib-info">
              <div class="lib-title" x-text="item.title"></div>
              <div class="lib-meta" x-text="item.source + (item.duration ? ' · ' + fmtDuration(item.duration) : '') + (item.project_id ? ' · 📁' + (projects.find(p=>p.id===item.project_id)?.name || item.project_id) : '')"></div>
              <span class="lib-status" :class="item.status" x-text="item.status"></span>
            </div>
            <button class="lib-delete" @click="deleteClip(item.id)" title="Remove">×</button>
          </div>
        </template>
      </div>
    </div>
  </div>


  <!-- Preview modal -->
  <div class="modal-overlay" x-show="preview" @click.self="closePreview()" x-cloak>
    <div class="modal-box" @click.stop>
      <div class="modal-header">
        <div class="modal-title" x-text="preview?.title"></div>
        <button class="modal-close" @click="closePreview()">✕</button>
      </div>
      <div class="modal-video">
        <template x-if="preview?.source === 'youtube'">
          <iframe
            :src="preview.preview_url + '?autoplay=1&rel=0'"
            allow="autoplay; fullscreen"
            allowfullscreen
          ></iframe>
        </template>
        <template x-if="preview?.source === 'archive'">
          <iframe
            :src="preview.preview_url"
            allow="fullscreen"
            allowfullscreen
          ></iframe>
        </template>
        <template x-if="preview?.source !== 'youtube' && preview?.source !== 'archive'">
          <video :src="preview?.preview_url" controls autoplay style="background:#000;"></video>
        </template>
      </div>
      <div class="modal-footer">
        <div>
          <div class="modal-meta" x-text="preview?.source + (preview?.duration ? ' · ' + fmtDuration(preview?.duration) : '') + (preview?.width ? ' · ' + preview.width + '×' + preview.height : '')"></div>
          <div class="modal-license" x-text="preview?.license"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <select class="project-select" x-model="downloadProjectId">
            <option value="">No project (downloads/)</option>
            <template x-for="proj in projects" :key="proj.id">
              <option :value="proj.id" x-text="proj.name"></option>
            </template>
          </select>
          <button class="btn btn-primary" @click="triggerDownload(preview); closePreview()">
            ↓ Download
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-stack">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="toast" :class="'toast-' + toast.type" x-text="toast.msg"></div>
    </template>
  </div>

</div>

<script>
function brollApp() {
  return {
    query: '',
    results: [],
    loading: false,
    searched: false,
    selected: null,
    preview: null,
    library: [],
    toasts: [],
    downloadStates: {}, // id -> 'downloading' | 'done' | 'error'
    pollTimers: {},

    // Projects
    projects: [],
    activeProject: null,
    showNewProject: false,
    newProjectName: '',
    downloadProjectId: '',

    sources: [
      { id: 'pexels',  label: 'Pexels',   on: true },
      { id: 'pixabay', label: 'Pixabay',  on: true },
      { id: 'archive', label: 'Archive',  on: true },
      { id: 'youtube', label: 'YouTube',  on: true },
    ],

    async init() {
      await this.loadProjects();
      await this.loadLibrary();
      setInterval(() => {
        const hasActive = Object.values(this.downloadStates).some(s => s === 'downloading');
        if (hasActive) this.loadLibrary();
      }, 5000);
    },

    // ── Projects ──

    async loadProjects() {
      try {
        const res = await fetch('/api/projects');
        this.projects = await res.json();
      } catch (_) {}
    },

    async createProject() {
      const name = this.newProjectName.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (!res.ok) throw new Error(await res.text());
        this.newProjectName = '';
        this.showNewProject = false;
        await this.loadProjects();
        this.toast('Project created', 'success');
      } catch (e) {
        this.toast('Failed: ' + e.message, 'error');
      }
    },

    async deleteProject(id) {
      try {
        await fetch(`/api/projects/${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (this.activeProject === id) this.activeProject = null;
        await this.loadProjects();
        await this.loadLibrary();
        this.toast('Project deleted', 'info');
      } catch (e) {
        this.toast('Delete failed', 'error');
      }
    },

    filterByProject(id) {
      this.activeProject = id;
      this.loadLibrary();
    },

    // ── Search ──

    activeSources() {
      return this.sources.filter(s => s.on).map(s => s.id).join(',');
    },

    async doSearch() {
      const q = this.query.trim();
      if (!q) return;
      this.loading = true;
      this.searched = true;
      this.results = [];
      try {
        const sources = this.activeSources();
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&sources=${sources}`);
        if (!res.ok) throw new Error(await res.text());
        this.results = await res.json();
      } catch (e) {
        this.toast('Search failed: ' + e.message, 'error');
      } finally {
        this.loading = false;
      }
    },

    clearSearch() {
      this.query = '';
      this.results = [];
      this.searched = false;
      this.selected = null;
    },

    selectVideo(video) { this.selected = video; },

    openPreview(video) {
      this.preview = video;
      // Pre-select active project
      this.downloadProjectId = this.activeProject || '';
    },
    closePreview() { this.preview = null; },

    // ── Downloads ──

    async triggerDownload(video) {
      if (!video) return;
      if (this.downloadStates[video.id] === 'downloading') return;

      this.downloadStates[video.id] = 'downloading';
      this.toast('Download started: ' + video.title.slice(0, 40) + '…', 'info');

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id: video.id,
            title: video.title,
            source: video.source,
            download_url: video.download_url,
            thumbnail: video.thumbnail,
            duration: video.duration,
            project_id: this.downloadProjectId || null,
          }),
        });
        if (!res.ok) throw new Error(await res.text());
        this.loadLibrary();
        this.pollStatus(video.id);
      } catch (e) {
        this.downloadStates[video.id] = 'error';
        this.toast('Download failed: ' + e.message, 'error');
      }
    },

    pollStatus(id) {
      if (this.pollTimers[id]) clearInterval(this.pollTimers[id]);
      this.pollTimers[id] = setInterval(async () => {
        try {
          const res = await fetch(`/api/download/status/${encodeURIComponent(id)}`);
          const data = await res.json();
          if (data.status === 'complete') {
            this.downloadStates[id] = 'done';
            clearInterval(this.pollTimers[id]);
            this.toast('Download complete!', 'success');
            this.loadLibrary();
          } else if (data.status === 'error') {
            this.downloadStates[id] = 'error';
            clearInterval(this.pollTimers[id]);
            this.toast('Download error.', 'error');
            this.loadLibrary();
          }
        } catch (_) {}
      }, 3000);
    },

    getDownloadClass(id) {
      const s = this.downloadStates[id];
      if (s === 'downloading') return 'downloading';
      if (s === 'done') return 'done';
      return '';
    },
    getDownloadLabel(id) {
      const s = this.downloadStates[id];
      if (s === 'downloading') return '⟳ Fetching';
      if (s === 'done') return '✓ Saved';
      return '↓ Save';
    },

    // ── Library ──

    async loadLibrary() {
      try {
        const url = this.activeProject
          ? `/api/library?project_id=${encodeURIComponent(this.activeProject)}`
          : '/api/library';
        const res = await fetch(url);
        const data = await res.json();
        this.library = data;
        data.forEach(item => {
          if (item.status === 'complete') this.downloadStates[item.id] = 'done';
          if (item.status === 'error') this.downloadStates[item.id] = 'error';
          if (item.status === 'downloading' || item.status === 'pending') {
            this.downloadStates[item.id] = 'downloading';
          }
        });
      } catch (_) {}
    },

    async deleteClip(id) {
      try {
        await fetch(`/api/library/${encodeURIComponent(id)}`, { method: 'DELETE' });
        delete this.downloadStates[id];
        this.loadLibrary();
        this.toast('Clip removed', 'info');
      } catch (e) {
        this.toast('Delete failed', 'error');
      }
    },

    fmtDuration(seconds) {
      if (!seconds) return '';
      const s = Math.round(seconds);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}:${String(m % 60).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
      return `${m}:${String(s % 60).padStart(2,'0')}`;
    },

    toast(msg, type = 'info') {
      const id = Date.now();
      this.toasts.push({ id, msg, type });
      setTimeout(() => {
        this.toasts = this.toasts.filter(t => t.id !== id);
      }, 4000);
    },
  };
}
</script>
</body>
</html>
